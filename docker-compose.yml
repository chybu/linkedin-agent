services:
  postgres:
    image: postgres:14.20
    container_name: linkedin_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobsdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql_init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d jobsdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:5.4.1
    container_name: linkedin_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: